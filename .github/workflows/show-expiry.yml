name: Show Secret Expiry (run 1+ min after demo-pipeline)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  show-expiry:
    name: Prove Credential Is Gone
    runs-on: [self-hosted, demo]
    environment: demo

    steps:
      - name: Attempt to connect with expired credential (MUST FAIL)
        # This step failing IS the demo — do not add continue-on-error
        run: |
          source /tmp/vault-demo-creds
          echo "::add-mask::$DB_USER"
          echo "::add-mask::$DB_PASS"

          echo "Attempting to connect as $DB_USER..."
          echo "Expected: FATAL: role does not exist"
          echo ""

          PGPASSWORD="$DB_PASS" psql \
            "host=${{ secrets.DEMO_VM_PRIVATE_IP }} port=5432 dbname=demo_app \
             user=$DB_USER sslmode=disable" \
            --command "SELECT 1;"

          # If psql succeeds the TTL hasn't elapsed — fail explicitly
          echo "ERROR: credential still valid — wait longer before running this workflow"
          exit 1

name: Vault JWT Auth Demo

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write   # required for Azure OIDC
  contents: read

jobs:
  demo:
    name: Azure OIDC → Vault JWT → Dynamic DB Credential
    runs-on: [self-hosted, demo]
    environment: demo

    steps:
      - name: Azure login via OIDC (no stored secret)
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          allow-no-subscriptions: true

      - name: Exchange Azure token for Vault token
        env:
          VAULT_ADDR: ${{ secrets.VAULT_ADDR }}
          VAULT_NAMESPACE: admin/cicd-demo-ns
        run: |
          JWT=$(az account get-access-token \
            --scope "api://${{ secrets.AZURE_CLIENT_ID }}/.default" \
            --query accessToken \
            --output tsv)
          echo "::add-mask::$JWT"

          VAULT_TOKEN=$(vault write -field=token auth/jwt/login \
            role=github-actions-demo \
            jwt="$JWT")
          echo "::add-mask::$VAULT_TOKEN"
          echo "VAULT_TOKEN=$VAULT_TOKEN" >> "$GITHUB_ENV"

      - name: Fetch dynamic DB credential from Vault
        env:
          VAULT_ADDR: ${{ secrets.VAULT_ADDR }}
          VAULT_NAMESPACE: admin/cicd-demo-ns
        run: |
          SECRET=$(vault read -format=json database/creds/demo-role)

          DB_USER=$(echo "$SECRET" | jq -r '.data.username')
          DB_PASS=$(echo "$SECRET" | jq -r '.data.password')

          # Persist for show-expiry workflow (same runner, read before masking)
          printf 'DB_USER=%s\nDB_PASS=%s\n' "$DB_USER" "$DB_PASS" > /tmp/vault-demo-creds

          echo "::add-mask::$DB_USER"
          echo "::add-mask::$DB_PASS"
          echo "DB_USER=$DB_USER" >> "$GITHUB_ENV"
          echo "DB_PASS=$DB_PASS" >> "$GITHUB_ENV"

          echo "Credential issued: $DB_USER (TTL 300s)"

      - name: Connect to PostgreSQL and log the secret (the wow moment)
        run: |
          CREATED_AT=$(date -u +%Y-%m-%dT%H:%M:%SZ)

          PGPASSWORD="$DB_PASS" psql \
            "host=${{ secrets.DEMO_VM_PRIVATE_IP }} port=5432 dbname=demo_app user=$DB_USER sslmode=disable" \
            --command "INSERT INTO secret_log (username, created_at, ttl_seconds) \
                       VALUES ('$DB_USER', '$CREATED_AT', 60);"

          echo "Connected as $DB_USER — secret written to database"
          echo "Web UI: https://demovm.ricardo.engineer"
